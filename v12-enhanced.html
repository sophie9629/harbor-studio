<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enhanced Game v12</title>
    <!-- Improved Graphics -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Welcome to the Enhanced Game Experience!</h1>
    </header>

    <section id="dynamic-time-weather">
        <h2>Current Time and Weather</h2>
        <div id="time"></div>
        <div id="weather"></div>
    </section>

    <section id="music-player">
        <h2>Enhanced Music Player</h2>
        <input type="file" id="upload-music" accept="audio/*">
        <audio id="audio-player" controls>
            <source src="default-music.mp3" type="audio/mpeg">
            Your browser does not support the audio element.
        </audio>
    </section>

    <section id="game-levels">
        <h2>Expanded Level Content</h2>
        <div id="act-1">Act 1 Content...</div>
        <div id="act-2">Act 2 Content...</div>
        <div id="act-3">Act 3 Content...</div>
    </section>

    <script>
        // Dynamic Time Function
        function updateTime() {
            const now = new Date();
            document.getElementById('time').innerText = now.toUTCString();
        }
        setInterval(updateTime, 1000);

        // Fetch Weather Data Function
        async function fetchWeather() {
            const response = await fetch('https://api.weatherapi.com/v1/current.json?key=YOUR_API_KEY&q=YOUR_LOCATION');
            const data = await response.json();
            document.getElementById('weather').innerText = `Weather: ${data.current.condition.text}, Temperature: ${data.current.temp_c}°C`;
        }
        fetchWeather();
    </script>
</body>
</html>
